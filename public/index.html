<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Radar de Oportunidades</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c1220;--s1:#111827;--s2:#162338;--s3:#1c2d45;--s4:#223353;
  --b1:rgba(148,163,184,.09);--b2:rgba(148,163,184,.17);
  --t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b;
  --blue:#2563eb;--b2c:#3b82f6;--b3c:#93c5fd;
  --green:#059669;--g2:#10b981;--g3:#6ee7b7;
  --purple:#7c3aed;--p2:#8b5cf6;--p3:#c4b5fd;
  --amber:#d97706;--a2:#f59e0b;--a3:#fcd34d;
  --red:#dc2626;--r2:#ef4444;--r3:#fca5a5;
  --tech-c:#2563eb;--tech-bg:rgba(37,99,235,.11);--tech-t:#93c5fd;
  --trein-c:#059669;--trein-bg:rgba(5,150,105,.11);--trein-t:#6ee7b7;
  --rh-c:#7c3aed;--rh-bg:rgba(124,58,237,.11);--rh-t:#c4b5fd;
  --r:8px;--rl:12px;
}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;font-size:13px;color:var(--t1);background:var(--bg)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}
#app{display:flex;height:100vh;overflow:hidden}
#sb{width:218px;min-width:218px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column}
.brand{padding:15px 14px 12px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px}
.brand-ico{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--b2c));display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;flex-shrink:0}
.brand-name{font-size:13px;font-weight:700;letter-spacing:-.02em;line-height:1.2}
.brand-sub{font-size:10px;color:var(--t3)}
.ns{padding:10px 12px 3px;font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase}
.nb{display:flex;align-items:center;gap:8px;padding:7px 10px;margin:1px 7px;border-radius:var(--r);cursor:pointer;color:var(--t2);font-size:12px;font-weight:500;border:none;background:none;width:calc(100% - 14px);text-align:left;transition:all .12s}
.nb:hover{background:var(--s2);color:var(--t1)}
.nb.a-all  {background:rgba(37,99,235,.14);color:var(--b3c)}
.nb.a-tech {background:var(--tech-bg);color:var(--tech-t)}
.nb.a-trein{background:var(--trein-bg);color:var(--trein-t)}
.nb.a-rh   {background:var(--rh-bg);color:var(--rh-t)}
.nb.a-fav  {background:rgba(245,158,11,.14);color:var(--a3)}
.nba{margin-left:auto;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.sep{height:1px;background:var(--b1);margin:7px 12px}
.sf{margin-top:auto;padding:11px 13px;border-top:1px solid var(--b1);font-size:10px;color:var(--t3)}
.sf-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tb{height:50px;min-height:50px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:7px;flex-shrink:0}
.at{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--b1);background:none;color:var(--t2);transition:all .12s;white-space:nowrap}
.at:hover{background:var(--s2);color:var(--t1)}
.at.ta    {background:rgba(37,99,235,.13);color:var(--b3c);border-color:rgba(37,99,235,.3)}
.at.ttech {background:var(--tech-bg);color:var(--tech-t);border-color:rgba(37,99,235,.3)}
.at.ttrein{background:var(--trein-bg);color:var(--trein-t);border-color:rgba(5,150,105,.3)}
.at.trh   {background:var(--rh-bg);color:var(--rh-t);border-color:rgba(124,58,237,.3)}
.at.tfav  {background:rgba(245,158,11,.13);color:var(--a3);border-color:rgba(245,158,11,.3)}
.sp{flex:1}
.sw{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:0 10px;width:190px;height:32px;transition:border-color .12s}
.sw:focus-within{border-color:var(--b2c)}
.sw input{background:none;border:none;outline:none;color:var(--t1);font-size:12px;font-family:'Inter',sans-serif;width:100%}
.sw input::placeholder{color:var(--t3)}
.ib{width:32px;height:32px;border-radius:var(--r);border:1px solid var(--b1);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:15px;transition:all .12s;position:relative}
.ib:hover{background:var(--s2);color:var(--t1)}
.nd{position:absolute;top:5px;right:5px;width:12px;height:12px;background:var(--r2);border-radius:50%;font-size:7px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;border:1.5px solid var(--s1)}
#ct{flex:1;overflow-y:auto;padding:16px 18px}
.mets{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.mc{background:var(--s2);border:1px solid var(--b1);border-radius:var(--rl);padding:13px 14px;transition:border-color .12s}
.mc:hover{border-color:var(--b2)}
.mc-l{font-size:10px;color:var(--t3);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.mc-v{font-size:24px;font-weight:700;line-height:1;letter-spacing:-.03em}
.mc-s{font-size:10px;color:var(--t3);margin-top:5px}
.filt{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap;align-items:center}
.fs{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:6px 9px;color:var(--t2);font-size:11px;font-family:'Inter',sans-serif;outline:none;cursor:pointer}
.fs:hover,.fs:focus{border-color:var(--b2)}
.rc{margin-left:auto;font-size:10px;color:var(--t3);background:var(--s3);border-radius:10px;padding:3px 9px}
.cols{display:grid;grid-template-columns:1fr 260px;gap:13px}
.colr{display:flex;flex-direction:column;gap:11px}
.card{background:var(--s2);border:1px solid var(--b1);border-radius:var(--rl);padding:13px}
.ch{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:11px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.04em}
.ops{display:flex;flex-direction:column;gap:7px}
.op{background:var(--s2);border:1px solid var(--b1);border-radius:var(--rl);padding:12px;cursor:pointer;transition:all .14s}
.op:hover{background:var(--s3);border-color:var(--b2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.2)}
.op.favorited{border-color:rgba(245,158,11,.35)}
.op-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.op-tit{font-size:12px;font-weight:600;color:var(--t1);line-height:1.4;flex:1}
.pri{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0}
.pA{background:rgba(220,38,38,.18);color:#fca5a5}
.pM{background:rgba(217,119,6,.18);color:#fcd34d}
.pB{background:rgba(5,150,105,.16);color:#6ee7b7}
.op-org{font-size:10px;color:var(--t3);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.op-foot{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--s4);color:var(--t3);border:1px solid var(--b1);white-space:nowrap}
.tag-tech {background:var(--tech-bg);color:var(--tech-t);border-color:rgba(37,99,235,.22)}
.tag-trein{background:var(--trein-bg);color:var(--trein-t);border-color:rgba(5,150,105,.22)}
.tag-rh   {background:var(--rh-bg);color:var(--rh-t);border-color:rgba(124,58,237,.22)}
.tag-pncp {background:rgba(37,99,235,.12);color:#93c5fd;border-color:rgba(37,99,235,.25)}
.tag-siasg{background:rgba(5,150,105,.12);color:#6ee7b7;border-color:rgba(5,150,105,.25)}
.dias{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:2px}
.scw{margin-left:auto;display:flex;align-items:center;gap:5px}
.scn{font-size:11px;font-weight:700;min-width:22px;text-align:right}
.scb{width:42px;height:3px;background:var(--s4);border-radius:2px;overflow:hidden}
.scf{height:3px;border-radius:2px}
.opbtn{width:22px;height:22px;border-radius:5px;border:1px solid var(--b1);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);font-size:11px;transition:all .12s;flex-shrink:0}
.opbtn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.opbtn.fav-btn{color:var(--t3)}
.opbtn.fav-btn.on{color:var(--a2);border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.1)}
.empty{text-align:center;padding:44px 20px;color:var(--t3)}
.empty i{font-size:40px;display:block;margin-bottom:12px;opacity:.2}
.tl{display:flex;flex-direction:column}
.tlr{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--b1);cursor:pointer}
.tlr:last-child{border-bottom:none}
.tld{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tlb{flex:1;min-width:0}
.tln{font-size:10px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tls{font-size:9px;color:var(--t3)}
.tldias{font-size:10px;font-weight:700;white-space:nowrap}
.abr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.abl{font-size:11px;color:var(--t2);width:85px;flex-shrink:0}
.abt{flex:1;height:5px;background:var(--s4);border-radius:3px;overflow:hidden}
.abf{height:5px;border-radius:3px;transition:width .6s ease}
.abn{font-size:10px;color:var(--t3);min-width:22px;text-align:right}
.pag{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:13px}
.pbtn{padding:5px 11px;border-radius:var(--r);border:1px solid var(--b1);background:var(--s2);color:var(--t2);cursor:pointer;font-size:11px;transition:all .12s}
.pbtn:hover{background:var(--s3);color:var(--t1)}
.pbtn:disabled{opacity:.3;cursor:not-allowed}
.pinfo{font-size:11px;color:var(--t3)}
.progw{background:var(--s3);border-radius:3px;height:5px;margin-bottom:11px;overflow:hidden}
.progf{height:5px;background:linear-gradient(90deg,var(--blue),var(--b2c));border-radius:3px;transition:width .4s ease}
.logbox{background:var(--s4);border:1px solid var(--b1);border-radius:var(--r);padding:10px 12px;height:180px;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);line-height:1.8}
.ll{display:block}
.ll.ok   {color:var(--g3)}
.ll.info {color:var(--b3c)}
.ll.erro {color:var(--r3)}
.ll.aviso{color:var(--a3)}
.btnp{width:100%;padding:9px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .12s}
.btnp:hover{background:#1d4ed8}
.btnp:disabled{opacity:.4;cursor:not-allowed}
.btns{padding:8px 13px;background:var(--s3);color:var(--t2);border:1px solid var(--b1);border-radius:var(--r);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px;transition:all .12s}
.btns:hover{background:var(--s4);color:var(--t1)}
.csr{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--b1);font-size:11px}
.csr:last-child{border-bottom:none}
.ah{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.ab2{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:var(--r);font-size:12px;font-weight:500}
.ah-tit{font-size:15px;font-weight:600}
.ah-sub{margin-left:auto;font-size:10px;color:var(--t3)}
.ah-ref{padding:5px 10px;border-radius:var(--r);border:1px solid var(--b1);background:none;color:var(--t3);font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .12s;font-family:'Inter',sans-serif}
.ah-ref:hover{background:var(--s2);color:var(--t1)}
.inp-kw{width:100%;background:var(--s3);border:1px solid var(--b1);border-radius:var(--r);padding:7px 10px;color:var(--t1);font-size:12px;font-family:'Inter',sans-serif;outline:none;transition:border-color .12s}
.inp-kw:focus{border-color:var(--b2c)}
.kw-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:10px;font-size:11px;margin:3px;background:var(--s4);color:var(--t2);border:1px solid var(--b1)}
.kw-pill button{background:none;border:none;cursor:pointer;color:var(--t3);font-size:11px;padding:0;line-height:1;transition:color .1s}
.kw-pill button:hover{color:var(--r3)}
.nota-area{width:100%;background:var(--s3);border:1px solid var(--b1);border-radius:var(--r);padding:8px 10px;color:var(--t1);font-size:12px;font-family:'Inter',sans-serif;outline:none;resize:vertical;min-height:70px;transition:border-color .12s}
.nota-area:focus{border-color:var(--b2c)}

/* MODAL POPUP */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s ease;}
#modal-overlay.open{opacity:1;pointer-events:all;}
#modal{background:var(--s1);border:1px solid var(--b2);border-radius:16px;width:100%;max-width:620px;max-height:88vh;display:flex;flex-direction:column;transform:translateY(12px);transition:transform .2s ease;overflow:hidden;}
#modal-overlay.open #modal{transform:translateY(0);}
.modal-head{padding:16px 18px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:flex-start;gap:12px;flex-shrink:0;}
.modal-head-body{flex:1;min-width:0;}
.modal-titulo{font-size:14px;font-weight:600;color:var(--t1);line-height:1.5;margin-bottom:6px;}
.modal-badges{display:flex;gap:6px;flex-wrap:wrap;}
.modal-close{width:30px;height:30px;border-radius:var(--r);background:var(--s3);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:16px;flex-shrink:0;transition:all .12s;margin-top:2px;}
.modal-close:hover{background:var(--r2);color:#fff;border-color:var(--r2);}
.modal-body{overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:14px;}
.modal-section{}
.modal-section-title{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.modal-field{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:10px 12px;}
.modal-field-label{font-size:10px;color:var(--t3);margin-bottom:3px;}
.modal-field-value{font-size:12px;color:var(--t1);font-weight:500;line-height:1.4;}
.modal-field.full{grid-column:1/-1;}
.modal-objeto{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:12px 14px;font-size:12px;color:var(--t2);line-height:1.7;}
.modal-score-wrap{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:14px;}
.modal-score-num{font-size:32px;font-weight:700;line-height:1;letter-spacing:-.03em;}
.modal-score-info{flex:1;}
.modal-score-bar-bg{height:6px;background:var(--s4);border-radius:3px;overflow:hidden;margin-top:6px;}
.modal-score-bar-fill{height:6px;border-radius:3px;}
.modal-kws{display:flex;flex-wrap:wrap;gap:5px;}
.modal-kw{font-size:10px;padding:3px 9px;border-radius:10px;background:var(--s3);color:var(--t2);border:1px solid var(--b1);}
.modal-footer{padding:12px 18px;border-top:1px solid var(--b1);display:flex;gap:8px;flex-shrink:0;}
.modal-btn-primary{flex:1;padding:9px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .12s;text-decoration:none;}
.modal-btn-primary:hover{background:#1d4ed8;}
.modal-btn-sec{padding:9px 14px;background:var(--s3);color:var(--t2);border:1px solid var(--b1);border-radius:var(--r);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px;transition:all .12s;}
.modal-btn-sec:hover{background:var(--s4);color:var(--t1);}
.modal-btn-fav{padding:9px 14px;border-radius:var(--r);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px;transition:all .12s;border:1px solid rgba(245,158,11,.3);background:rgba(245,158,11,.08);color:var(--a3);}
.modal-btn-fav:hover{background:rgba(245,158,11,.15);}
.modal-btn-fav.on{background:rgba(245,158,11,.18);border-color:var(--a2);}
.urgente-banner{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:var(--r);padding:8px 12px;font-size:11px;color:var(--r3);display:flex;align-items:center;gap:7px;}

/* MODAL KW */
#kw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:1100;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s ease;}
#kw-overlay.open{opacity:1;pointer-events:all;}
#kw-modal{background:var(--s1);border:1px solid var(--b2);border-radius:16px;width:100%;max-width:580px;max-height:85vh;display:flex;flex-direction:column;transform:translateY(10px);transition:transform .2s ease;overflow:hidden;}
#kw-overlay.open #kw-modal{transform:translateY(0);}
.kw-head{padding:16px 18px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;}
.kw-body{overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:16px;}
.kw-section{background:var(--s2);border:1px solid var(--b1);border-radius:var(--rl);padding:13px 14px;}
.kw-section-head{display:flex;align-items:center;gap:7px;margin-bottom:10px;}
.kw-section-title{font-size:12px;font-weight:600;}
.kw-pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;min-height:28px;}
.kw-add{display:flex;gap:7px;}
.kw-footer{padding:12px 18px;border-top:1px solid var(--b1);display:flex;justify-content:flex-end;gap:8px;}


/* ── MERCADO ─────────────────────────────────────────────────── */
.mkt-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.mkt-tab{padding:6px 14px;border-radius:var(--r);border:1px solid var(--b1);background:none;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s}
.mkt-tab:hover{background:var(--s2);color:var(--t1)}
.mkt-tab.active{border-color:var(--b2c);background:var(--tech-bg);color:var(--tech-t)}
.mkt-tab.active.trein{border-color:rgba(5,150,105,.4);background:var(--trein-bg);color:var(--trein-t)}
.mkt-tab.active.rh{border-color:rgba(124,58,237,.4);background:var(--rh-bg);color:var(--rh-t)}
.mkt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.mkt-card{background:var(--s2);border:1px solid var(--b1);border-radius:var(--rl);padding:14px}
.mkt-card-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;font-weight:500}
.mkt-card-value{font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1}
.mkt-card-sub{font-size:10px;color:var(--t3);margin-top:4px}
.mkt-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.mkt-section{background:var(--s2);border:1px solid var(--b1);border-radius:var(--rl);padding:13px}
.mkt-section-title{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.mkt-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--b1)}
.mkt-row:last-child{border-bottom:none}
.mkt-row-name{flex:1;font-size:11px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mkt-row-bar-wrap{width:80px;height:4px;background:var(--s4);border-radius:2px;overflow:hidden}
.mkt-row-bar{height:4px;border-radius:2px}
.mkt-row-val{font-size:10px;color:var(--t3);min-width:36px;text-align:right}
.mkt-row-count{font-size:10px;font-weight:600;color:var(--t3);min-width:22px;text-align:right}
.mkt-editais{display:flex;flex-direction:column;gap:6px}
.mkt-edital{background:var(--s3);border:1px solid var(--b1);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:border-color .12s}
.mkt-edital:hover{border-color:var(--b2)}
.mkt-edital-obj{font-size:11px;color:var(--t1);font-weight:500;margin-bottom:3px;line-height:1.4}
.mkt-edital-meta{font-size:10px;color:var(--t3);display:flex;gap:8px;flex-wrap:wrap}
.mkt-loading{text-align:center;padding:40px;color:var(--t3)}
.mkt-loading i{font-size:28px;display:block;margin-bottom:8px;opacity:.3}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite;display:inline-block}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.fi{animation:fi .2s ease}
</style>
</head>

<script>
// ── PALAVRAS-CHAVE PADRÃO ─────────────────────────────────────────
const KW_DEFAULT = {

    peso:['software','sistema de informação','sistema integrado','sistema web','desenvolvimento de sistema',

      'consultoria de ti','solução de ti','infraestrutura de ti','computação em nuvem','cloud computing',

    bonus:['aprendizagem','aprendizado','habilidades','competências','desenvolvimento profissional',

      'recrutamento e seleção','processo seletivo','seleção de pessoal','seleção de servidores',

      'mapeamento de competências','clima organizacional','pesquisa de clima','cultura organizacional',
      'engajamento de colaboradores','bem-estar organizacional','saúde organizacional',
      'programa de liderança','desenvolvimento de lideranças','coaching executivo','coaching ',
      'mentoria ','mentoring','diversidade e inclusão','programa de diversidade',
      'plano de cargos e salários','política de remuneração','gestão de benefícios',
      'programa de jovens talentos','programa de estágio','programa trainee',
      'programa de aprendizagem','lei do aprendiz','outplacement','recolocação profissional',
      'plano de desenvolvimento individual','pdi '],

  },
};

// ── PALAVRAS-CHAVE (carrega do localStorage ou usa padrão) ────────
function carregarKW() {
  try {
    const saved = localStorage.getItem('radar_kw');
    if (saved) {
      const parsed = JSON.parse(saved);
      const kw = {};
      for (const area of Object.keys(KW_DEFAULT)) {
        kw[area] = {
          ...KW_DEFAULT[area],
          peso:  parsed[area]?.peso  || KW_DEFAULT[area].peso,
          bonus: parsed[area]?.bonus || KW_DEFAULT[area].bonus,
        };
      }
      return kw;
    }
  } catch {}
  return JSON.parse(JSON.stringify(KW_DEFAULT));
}

let KW = carregarKW();

// ── CLOUDFLARE WORKER ─────────────────────────────────────────────
const WORKER = 'https://radar-pncp.igorecosta1.workers.dev';

async function buscarPNCP(dias=3){
  const r=await fetch(`${WORKER}?dias=${dias}&maxpags=1`,{signal:AbortSignal.timeout(30000)});
  if(!r.ok)throw new Error(`Worker HTTP ${r.status}`);
  const j=await r.json();
  return Array.isArray(j?.data)?j.data:[];
}

// ── CLASSIFICAÇÃO ─────────────────────────────────────────────────
function classificar(texto){
  if(!texto)return null;
  const t=texto.toLowerCase();
  const res={};
  for(const[area,cfg]of Object.entries(KW)){
    let score=0;const found=new Set();
    for(const kw of cfg.peso){if(t.includes(kw.trim())){score+=10;found.add(kw.trim());}}
    for(const kw of cfg.bonus){if(t.includes(kw.trim())){score+=3;found.add(kw.trim());}}
    if(score>=10)res[area]={score,found:[...found]};
  }
  if(!Object.keys(res).length)return null;
  const[melhor,dados]=Object.entries(res).sort((a,b)=>b[1].score-a[1].score)[0];
  return{area:melhor,label:KW[melhor].label,score:dados.score,palavras:dados.found.slice(0,8)};
}
function prioridade(s){return s>=30?'Alta':s>=13?'Média':'Baixa';}

function normalizar(raw){
  const org=raw.orgaoEntidade||{};
  const uni=raw.unidadeOrgao||{};
  const num=raw.numeroControlePNCP||`${org.cnpj||'x'}-${raw.anoCompra}-${raw.sequencialCompra}`;
  const fonte=raw._fonte||'PNCP';
  return{
    id:num,fonte,
    objeto:(raw.objetoCompra||'').trim(),
    orgao:org.razaoSocial||uni.nomeUnidade||'',
    cnpj:org.cnpj||'',
    uf:uni.ufSigla||'',
    municipio:uni.municipioNome||'',
    modalidade:raw.modalidadeNome||'',
    valor:raw.valorTotalEstimado||0,
    data_publicacao:(raw.dataPublicacaoPncp||'').slice(0,10),
    data_abertura:(raw.dataAberturaProposta||'').slice(0,10),
    data_encerramento:(raw.dataEncerramentoProposta||raw.dataAberturaProposta||'').slice(0,10),
    numero_processo:raw.processo||raw.numeroCompra||'',
    situacao:raw.situacaoCompraNome||'',
    info_complementar:raw.informacaoComplementar||'',
    link:raw.linkSistemaOrigem||`https://pncp.gov.br/app/editais/${num}`,
  };
}

// ── FAVORITOS ─────────────────────────────────────────────────────
function getFavs(){try{return JSON.parse(localStorage.getItem('radar_favs')||'[]');}catch{return[];}}
function saveFavs(a){localStorage.setItem('radar_favs',JSON.stringify(a));}
function isFav(id){return getFavs().includes(id);}
function toggleFav(id){
  let favs=getFavs();
  if(favs.includes(id))favs=favs.filter(f=>f!==id);
  else favs.push(id);
  saveFavs(favs);
  atualizarBadgeFav();
  return favs.includes(id);
}
function atualizarBadgeFav(){
  const favs=getFavs();
  const n=S.editais.filter(e=>favs.includes(e.id)).length;
  document.getElementById('na-fav').textContent=n;
}

// ── NOTAS ─────────────────────────────────────────────────────────
function getNota(id){try{return localStorage.getItem('radar_nota_'+id)||'';}catch{return '';}}
function saveNota(id,txt){
  if(txt.trim())localStorage.setItem('radar_nota_'+id,txt);
  else localStorage.removeItem('radar_nota_'+id);
}

// ── ESTADO ────────────────────────────────────────────────────────
const S={area:'all',view:'dash',pagina:1,busca:'',pri:'',uf:'',dias:'',editais:[],stats:{},capturado_em:null};
const ACFG={
  all: {label:'Todas as áreas',c:'var(--b2c)', bg:'rgba(37,99,235,.12)', t:'var(--b3c)',   icon:'ti-layout-dashboard'},
  tech:{label:'Tecnologia',    c:'var(--blue)',bg:'var(--tech-bg)',       t:'var(--tech-t)',icon:'ti-cpu'},
  trein:{label:'Treinamento',  c:'var(--g2)', bg:'var(--trein-bg)',      t:'var(--trein-t)',icon:'ti-school'},
  rh:  {label:'Programas de RH',c:'var(--p2)',bg:'var(--rh-bg)',         t:'var(--rh-t)', icon:'ti-users'},
  fav: {label:'Salvos',        c:'var(--a2)', bg:'rgba(245,158,11,.12)', t:'var(--a3)',    icon:'ti-bookmark'},
  mkt: {label:'Mercado',        c:'var(--b2c)',bg:'rgba(37,99,235,.12)',  t:'var(--b3c)',  icon:'ti-chart-line'},
};

renderDash();

function setArea(a){
  S.area=a;S.pagina=1;S.view='dash';
  ['all','tech','trein','rh','fav','mkt'].forEach(k=>{
    const nb=document.getElementById('nb-'+k);
    const tb=document.getElementById('tab-'+k);
    if(nb)nb.className='nb'+(k===a?' a-'+a:'');
    if(tb)tb.className='at'+(k===a?' t'+a:'');
  });
  if(a==='mkt')renderMercado();else renderDash();
}
function setView(v){S.view=v;if(v==='captura')renderCaptura();else if(v==='mkt'||S.area==='mkt')renderMercado();else renderDash();}

const AREA_MAP={tech:'tecnologia',trein:'treinamento',rh:'rh'};

function filtrar(){
  let d=S.editais;
  const favs=getFavs();
  if(S.area==='fav') return d.filter(e=>favs.includes(e.id));
  if(S.area!=='all'){const a=AREA_MAP[S.area]||S.area;d=d.filter(e=>e.area===a);}
  if(S.pri)  d=d.filter(e=>e.prioridade===S.pri);
  if(S.uf)   d=d.filter(e=>e.uf===S.uf);
  if(S.dias) d=d.filter(e=>e.data_publicacao>=dHa(parseInt(S.dias)));
  if(S.busca){const q=S.busca.toLowerCase();d=d.filter(e=>e.objeto.toLowerCase().includes(q)||(e.orgao||'').toLowerCase().includes(q));}
  return d;
}

function renderDash(){
  const A=ACFG[S.area],todos=filtrar(),st=S.stats;
  const ufs=[...new Set(S.editais.map(e=>e.uf).filter(Boolean))].sort();
  const PG=16,totalPags=Math.ceil(todos.length/PG),page=todos.slice((S.pagina-1)*PG,S.pagina*PG);
  const nArea=S.area==='all'?(st.total||0):S.area==='fav'?todos.length:(st[AREA_MAP[S.area]||S.area]||0);
  const nAlta=todos.filter(e=>e.prioridade==='Alta').length;
  const nUrg=todos.filter(e=>diasAte(e.data_encerramento)>=0&&diasAte(e.data_encerramento)<=7).length;
  const nNov=todos.filter(e=>e.data_publicacao>=dHa(7)).length;

  document.getElementById('ct').innerHTML=`
    <div class="ah">
      <div class="ab2" style="background:${A.bg};color:${A.t}"><i class="ti ${A.icon}" aria-hidden="true" style="font-size:14px"></i> ${A.label}</div>
      <span class="ah-tit">${todos.length} oportunidades</span>
      <button class="ah-ref" onclick="setView('captura')"><i class="ti ti-refresh" aria-hidden="true"></i> Atualizar</button>
      <span class="ah-sub">${S.capturado_em?'Capturado às '+new Date(S.capturado_em).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'Nenhuma captura ainda'}</span>
    </div>
    <div class="mets">
      <div class="mc"><div class="mc-l">Editais ${S.area==='all'?'totais':S.area==='fav'?'salvos':A.label.toLowerCase()}</div><div class="mc-v" style="color:${A.c}">${nArea}</div><div class="mc-s">capturados do PNCP</div></div>
      <div class="mc"><div class="mc-l">Alta prioridade</div><div class="mc-v" style="color:var(--r3)">${nAlta}</div><div class="mc-s">score alto</div></div>
      <div class="mc"><div class="mc-l">Prazo urgente</div><div class="mc-v" style="color:var(--a3)">${nUrg}</div><div class="mc-s">encerram em ≤ 7 dias</div></div>
      <div class="mc"><div class="mc-l">Recentes</div><div class="mc-v" style="color:var(--g3)">${nNov}</div><div class="mc-s">nos últimos 7 dias</div></div>
    </div>
    <div class="filt">
      <select class="fs" onchange="S.pri=this.value;S.pagina=1;renderDash()">
        <option value="">Toda prioridade</option>
        <option value="Alta" ${S.pri==='Alta'?'selected':''}>Alta</option>
        <option value="Média" ${S.pri==='Média'?'selected':''}>Média</option>
        <option value="Baixa" ${S.pri==='Baixa'?'selected':''}>Baixa</option>
      </select>
      <select class="fs" onchange="S.uf=this.value;S.pagina=1;renderDash()">
        <option value="">Todos os estados</option>
        ${ufs.map(u=>`<option ${S.uf===u?'selected':''}>${u}</option>`).join('')}
      </select>
      <select class="fs" onchange="S.dias=this.value;S.pagina=1;renderDash()">
        <option value="">Qualquer período</option>
        <option value="1"  ${S.dias==='1' ?'selected':''}>Hoje</option>
        <option value="7"  ${S.dias==='7' ?'selected':''}>Últimos 7 dias</option>
        <option value="30" ${S.dias==='30'?'selected':''}>Últimos 30 dias</option>
      </select>
      ${S.area==='all'?`<select class="fs" onchange="if(this.value)setArea(this.value)">
        <option value="">Filtrar por área</option>
        <option value="tech">Tecnologia</option>
        <option value="trein">Treinamento</option>
        <option value="rh">Programas de RH</option>
      </select>`:''}
      <button class="btns" onclick="setView('captura')"><i class="ti ti-radar" aria-hidden="true"></i> Capturar</button>
      <span class="rc">${todos.length} resultados</span>
    </div>
    <div class="cols">
      <div>
        <div class="ops fi">${page.length?page.map(opCard).join(''):emptyState()}</div>
        ${totalPags>1?`<div class="pag">
          <button class="pbtn" ${S.pagina<=1?'disabled':''} onclick="S.pagina--;renderDash()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Anterior</button>

  KW_EDIT = JSON.parse(JSON.stringify({

    treinamento:{peso:[...KW.treinamento.peso],bonus:[...KW.treinamento.bonus]},

function renderKWModal(){
  const areas=[
    {key:'tecnologia',label:'Tecnologia',t:'var(--tech-t)',bg:'var(--tech-bg)'},
    {key:'treinamento',label:'Treinamento',t:'var(--trein-t)',bg:'var(--trein-bg)'},
    {key:'rh',label:'Programas de RH',t:'var(--rh-t)',bg:'var(--rh-bg)'},
  ];
  document.getElementById('kw-body').innerHTML=areas.map(a=>`
    <div class="kw-section">

        <div class="kw-section-title" style="color:${a.t}">${a.label}</div>
        <span style="font-size:10px;color:var(--t3);margin-left:auto">${KW_EDIT[a.key].peso.length} termos principais · ${KW_EDIT[a.key].bonus.length} bônus</span>
      </div>
      <div style="font-size:10px;color:var(--t3);margin-bottom:5px">Termos principais (+10 pts cada)</div>
      <div class="kw-pills" id="pills-peso-${a.key}">
        ${KW_EDIT[a.key].peso.map((kw,i)=>`<span class="kw-pill"><span>${esc(kw.trim())}</span><button onclick="remKW('${a.key}','peso',${i})" title="Remover"><i class="ti ti-x" aria-hidden="true"></i></button></span>`).join('')}
      </div>
      <div class="kw-add">
        <input class="inp-kw" id="inp-peso-${a.key}" placeholder="Adicionar termo principal..." onkeydown="if(event.key==='Enter')addKW('${a.key}','peso')"/>
        <button class="btns" onclick="addKW('${a.key}','peso')" style="padding:7px 12px"><i class="ti ti-plus" aria-hidden="true"></i></button>
      </div>
      <div style="font-size:10px;color:var(--t3);margin:10px 0 5px">Termos bônus (+3 pts cada)</div>
      <div class="kw-pills" id="pills-bonus-${a.key}">
        ${KW_EDIT[a.key].bonus.map((kw,i)=>`<span class="kw-pill"><span>${esc(kw.trim())}</span><button onclick="remKW('${a.key}','bonus',${i})" title="Remover"><i class="ti ti-x" aria-hidden="true"></i></button></span>`).join('')}
      </div>
      <div class="kw-add">
        <input class="inp-kw" id="inp-bonus-${a.key}" placeholder="Adicionar termo bônus..." onkeydown="if(event.key==='Enter')addKW('${a.key}','bonus')"/>
        <button class="btns" onclick="addKW('${a.key}','bonus')" style="padding:7px 12px"><i class="ti ti-plus" aria-hidden="true"></i></button>
      </div>
    </div>
  `).join('');
}

function addKW(area,tipo){
  const inp=document.getElementById(`inp-${tipo}-${area}`);
  const val=(inp?.value||'').trim().toLowerCase();
  if(!val)return;
  if(!KW_EDIT[area][tipo].includes(val)){
    KW_EDIT[area][tipo].push(val);
    renderKWModal();
    setTimeout(()=>{const i=document.getElementById(`inp-${tipo}-${area}`);if(i)i.focus();},50);
  }
  if(inp)inp.value='';
}

function remKW(area,tipo,idx){
  KW_EDIT[area][tipo].splice(idx,1);
  renderKWModal();
}

function salvarKW(){
  for(const area of Object.keys(KW_EDIT)){
    KW[area].peso=[...KW_EDIT[area].peso];
    KW[area].bonus=[...KW_EDIT[area].bonus];
  }
  localStorage.setItem('radar_kw',JSON.stringify({
    tecnologia:{peso:KW.tecnologia.peso,bonus:KW.tecnologia.bonus},
    treinamento:{peso:KW.treinamento.peso,bonus:KW.treinamento.bonus},
    rh:{peso:KW.rh.peso,bonus:KW.rh.bonus},
  }));
  closeKW();
  if(S.editais.length){
    S.editais=S.editais.map(e=>{
      const cl=classificar(e.objeto);
      if(!cl)return e;
      return{...e,area:cl.area,score:cl.score,prioridade:prioridade(cl.score),palavras:cl.palavras};
    }).filter(e=>e.area);
    S.editais.sort((a,b)=>b.score-a.score);
    renderDash();
  }
}

function resetKW(){
  if(!confirm('Restaurar todas as palavras-chave para o padrão?'))return;
  KW_EDIT={
    tecnologia:{peso:[...KW_DEFAULT.tecnologia.peso],bonus:[...KW_DEFAULT.tecnologia.bonus]},
    treinamento:{peso:[...KW_DEFAULT.treinamento.peso],bonus:[...KW_DEFAULT.treinamento.bonus]},
    rh:{peso:[...KW_DEFAULT.rh.peso],bonus:[...KW_DEFAULT.rh.bonus]},
  };
  renderKWModal();
}

function closeKW(){document.getElementById('kw-overlay').classList.remove('open');}
function fecharKW(e){if(e.target===document.getElementById('kw-overlay'))closeKW();}

function emptyState(){

  if(!S.capturado_em)return`<div class="empty"><i class="ti ti-radar" aria-hidden="true"></i>Nenhum edital ainda.<br>Clique em <strong>"Capturar editais"</strong> para buscar.<br><br>
    <button class="btnp" style="width:auto;padding:8px 20px;margin:auto" onclick="setView('captura')"><i class="ti ti-player-play" aria-hidden="true"></i> Capturar agora</button></div>`;
  return`<div class="empty"><i class="ti ti-search" aria-hidden="true"></i>Nenhum resultado para os filtros.</div>`;

function renderTL(editais){
  const s=[...editais].filter(e=>diasAte(e.data_encerramento)>=0).sort((a,b)=>diasAte(a.data_encerramento)-diasAte(b.data_encerramento)).slice(0,8);
  if(!s.length)return'<div style="font-size:11px;color:var(--t3);padding:4px 0">Nenhum prazo ativo.</div>';
  return'<div class="tl">'+s.map(e=>{
    const d=diasAte(e.data_encerramento);const c=d<=7?'var(--r2)':d<=15?'var(--a2)':'var(--g2)';
    const idx=S.editais.indexOf(e);
    return`<div class="tlr" onclick="abrirModal(${idx})">
      <div class="tld" style="background:${c}"></div>
      <div class="tlb"><div class="tln">${esc((e.objeto||'').slice(0,44))}…</div>
      <div class="tls">${esc(e.orgao||'')}${e.uf?' · '+e.uf:''} · ${fmtD(e.data_encerramento)}</div></div>
      <div class="tldias" style="color:${c}">${d}d</div></div>`;
  }).join('')+'</div>';
}

function renderBarras(){
  const st=S.stats;
  const cfgs=[{l:'Tecnologia',c:'var(--b2c)',n:st.tecnologia||0},{l:'Treinamento',c:'var(--g2)',n:st.treinamento||0},{l:'RH',c:'var(--p2)',n:st.rh||0}];
  const max=Math.max(...cfgs.map(c=>c.n),1);
  return cfgs.map(c=>`<div class="abr"><span class="abl">${c.l}</span><div class="abt"><div class="abf" style="width:${Math.round(c.n/max*100)}%;background:${c.c}"></div></div><span class="abn">${c.n}</span></div>`).join('');
}

const MKT = { area:'tecnologia', dados:null, loading:false };

async function renderMercado(){
  const ct=document.getElementById('ct');
  if(!ct)return;

  const areaCfg={
    tecnologia:{label:'Tecnologia',c:'var(--tech-t)',cls:''},
    treinamento:{label:'Treinamento',c:'var(--trein-t)',cls:'trein'},
    rh:{label:'Programas de RH',c:'var(--rh-t)',cls:'rh'},
  };

  ct.innerHTML=`
    <div class="ah">
      <div class="ab2" style="background:rgba(37,99,235,.12);color:var(--b3c)"><i class="ti ti-chart-line" aria-hidden="true" style="font-size:14px"></i> Inteligência de Mercado B2G</div>
      <span class="ah-tit">Análise histórica do PNCP</span>
    </div>
    <div class="mkt-tabs">
      ${Object.entries(areaCfg).map(([k,v])=>`<button class="mkt-tab${MKT.area===k?' active '+v.cls:''}" onclick="mudarAreaMkt('${k}')">${v.label}</button>`).join('')}
      <button class="btns" style="margin-left:auto" onclick="carregarMercado()"><i class="ti ti-refresh" aria-hidden="true"></i> Atualizar</button>
    </div>
    <div id="mkt-content">
      <div class="mkt-loading"><i class="ti ti-chart-line spin" aria-hidden="true"></i>Carregando dados de mercado...</div>
    </div>`;

  await carregarMercado();

async function mudarAreaMkt(area){
  MKT.area=area;
  MKT.dados=null;
  await renderMercado();
}

async function carregarMercado(){
  const el=document.getElementById('mkt-content');
  if(!el)return;
  el.innerHTML='<div class="mkt-loading"><i class="ti ti-chart-line spin" aria-hidden="true"></i>Buscando dados históricos do PNCP...</div>';

  try{
    const r=await fetch(`${WORKER}/historico?area=${MKT.area}&dias=90`,{signal:AbortSignal.timeout(30000)});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();
    MKT.dados=d;
    renderMercadoDados(d);
  }catch(e){
    el.innerHTML=`<div class="mkt-loading"><i class="ti ti-alert-circle" aria-hidden="true"></i>Erro ao carregar: ${esc(e.message)}<br><br><button class="btns" onclick="carregarMercado()">Tentar novamente</button></div>`;
  }
}

function renderMercadoDados(d){
  const el=document.getElementById('mkt-content');
  if(!el)return;

  const fmt=v=>v?'R$ '+Number(v).toLocaleString('pt-BR',{notation:'compact',maximumFractionDigits:1}):'—';
  const fmtFull=v=>v?'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2}):'—';

  // Top órgãos
  const topOrgaos=d.top_orgaos||[];
  const maxCount=Math.max(...topOrgaos.map(o=>o.count),1);

  // Por UF
  const porUf=Object.entries(d.por_uf||{}).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxUf=Math.max(...porUf.map(u=>u[1]),1);

  // Por mês
  const porMes=Object.entries(d.por_mes||{}).sort((a,b)=>a[0].localeCompare(b[0])).slice(-6);
  const maxMes=Math.max(...porMes.map(m=>m[1]),1);

  // Editais recentes
  const editais=(d.editais||[]).slice(0,8);

  el.innerHTML=`
    <div class="mkt-grid">
      <div class="mkt-card">
        <div class="mkt-card-label">Editais (90 dias)</div>
        <div class="mkt-card-value" style="color:var(--b3c)">${(d.total||0).toLocaleString('pt-BR')}</div>
        <div class="mkt-card-sub">publicados no PNCP na área</div>
      </div>
      <div class="mkt-card">
        <div class="mkt-card-label">Volume total</div>
        <div class="mkt-card-value" style="color:var(--g3)">${fmt(d.valor_total)}</div>
        <div class="mkt-card-sub">em valor estimado</div>
      </div>
      <div class="mkt-card">

async function buscarOrgao(nome){
  const el=document.getElementById('mkt-content');
  if(!el)return;
  const prev=el.innerHTML;
  el.innerHTML='<div class="mkt-loading"><i class="ti ti-building spin" aria-hidden="true"></i>Carregando perfil do órgão...</div>';
  try{
    const r=await fetch(`${WORKER}/orgao?nome=${encodeURIComponent(nome)}`,{signal:AbortSignal.timeout(30000)});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();
    renderPerfilOrgao(d,prev);
  }catch(e){
    el.innerHTML=`<div class="mkt-loading"><i class="ti ti-alert-circle" aria-hidden="true"></i>Erro: ${esc(e.message)}<br><br><button class="btns" onclick="document.getElementById('mkt-content').innerHTML=prev">Voltar</button></div>`;
  }
}

  const org=d.orgao||{};
  const fmt=v=>v?'R$ '+Number(v).toLocaleString('pt-BR',{notation:'compact',maximumFractionDigits:1}):'—';
  const pa=d.por_area||{};
  const total=d.total_licitacoes||0;

  el.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <button class="btns" onclick="document.getElementById('mkt-content').innerHTML=arguments[0]" style="padding:6px 10px"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
      <div>
        <div style="font-size:14px;font-weight:600;color:var(--t1)">${esc(org.nome||'Órgão')}</div>
        <div style="font-size:11px;color:var(--t3)">${org.cnpj||''} ${org.municipio?'· '+org.municipio:''} ${org.uf?'· '+org.uf:''}</div>
      </div>
    </div>
    <div class="mkt-grid">
      <div class="mkt-card"><div class="mkt-card-label">Licitações (12 meses)</div><div class="mkt-card-value" style="color:var(--b3c)">${total}</div></div>
      <div class="mkt-card"><div class="mkt-card-label">Volume total</div><div class="mkt-card-value" style="color:var(--g3)">${fmt(d.valor_total)}</div></div>
      <div class="mkt-card"><div class="mkt-card-label">Ticket médio</div><div class="mkt-card-value" style="color:var(--a3)">${total?fmt((d.valor_total||0)/total):'—'}</div></div>
    </div>
    <div class="mkt-section" style="margin-bottom:12px">
      <div class="mkt-section-title"><i class="ti ti-tags" aria-hidden="true"></i> Compras por área</div>
      ${[['tecnologia','Tecnologia','var(--tech-t)','var(--b2c)'],['treinamento','Treinamento','var(--trein-t)','var(--g2)'],['rh','Programas de RH','var(--rh-t)','var(--p2)'],['outros','Outros','var(--t3)','var(--s4)']].map(([k,l,tc,bc])=>{

          <div class="mkt-row-bar-wrap" style="width:120px"><div class="mkt-row-bar" style="width:${pct}%;background:${bc}"></div></div>

      }).join('')}
    </div>
    <div class="mkt-section">
      <div class="mkt-section-title"><i class="ti ti-list" aria-hidden="true"></i> Últimas licitações</div>
      <div class="mkt-editais">
        ${(d.editais_recentes||[]).slice(0,8).map(e=>{
          const val=e.valorTotalEstimado;
          const dt=(e.dataPublicacaoPncp||'').slice(0,10);
          const idx=S.editais.findIndex(x=>x.id===e.numeroControlePNCP);
          return`<div class="mkt-edital" ${idx>=0?`onclick="abrirModal(${idx})"`:''}>
            <div class="mkt-edital-obj">${esc((e.objetoCompra||'').slice(0,100))}</div>
            <div class="mkt-edital-meta">
              ${val?`<span style="color:var(--g3)">R$ ${Number(val).toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>`:''}

  // Fix back button
  el.querySelector('button').onclick=()=>{el.innerHTML=prev;};

// ── EXECUTAR CAPTURA ──────────────────────────────────────────────
async function executarCaptura(){
  const btn=document.getElementById('btn-cap');
  if(btn)btn.disabled=true;
  const lb=document.getElementById('logbox');
  if(lb)lb.innerHTML='';
  const log=(msg,n='')=>{if(!lb)return;const el=document.createElement('span');el.className='ll '+n;el.textContent=`[${new Date().toLocaleTimeString('pt-BR')}] ${msg}\n`;lb.appendChild(el);lb.scrollTop=lb.scrollHeight;};
  const prog=p=>{const el=document.getElementById('pg');if(el)el.style.width=p+'%';};
  log('Conectando ao Worker Cloudflare (IP brasileiro)...','info');
  prog(10);
  try{
    log('Buscando editais no PNCP + SIASG...','info');
    const brutos=await buscarPNCP(3);
    prog(60);
    log(`Retornou ${brutos.length} editais. Classificando com suas palavras-chave...`,'info');
    S.editais=[];let tech=0,trein=0,rh=0;
    for(const raw of brutos){
      const item=normalizar(raw);
      if(!item.objeto)continue;
      const cl=classificar(item.objeto);
      if(!cl)continue;
      S.editais.push({...item,area:cl.area,score:cl.score,prioridade:prioridade(cl.score),palavras:cl.palavras});
      if(cl.area==='tecnologia')tech++;
      else if(cl.area==='treinamento')trein++;
      else if(cl.area==='rh')rh++;
    }
    S.editais.sort((a,b)=>b.score-a.score);
    S.capturado_em=new Date().toISOString();
    S.stats={total:S.editais.length,tecnologia:tech,treinamento:trein,rh,alta:S.editais.filter(e=>e.prioridade==='Alta').length};
    prog(100);
    log(`Tecnologia   : ${tech}`,'ok');
    log(`Treinamento  : ${trein}`,'ok');
    log(`Programas RH : ${rh}`,'ok');
    log(`Total relevante: ${S.editais.length} de ${brutos.length}`,'ok');
    document.getElementById('na-all').textContent=S.editais.length;
    document.getElementById('na-tech').textContent=tech;
    document.getElementById('na-trein').textContent=trein;
    document.getElementById('na-rh').textContent=rh;
    document.getElementById('nd').textContent=S.stats.alta||0;
    document.getElementById('sf-dot').style.background='var(--g2)';
    document.getElementById('sf-txt').textContent=S.editais.length+' oportunidades';
    document.getElementById('sf-ts').textContent='Capturado às '+new Date().toLocaleTimeString('pt-BR');
    atualizarBadgeFav();
  }catch(e){log(`Erro: ${e.message}`,'erro');}
  if(btn)btn.disabled=false;
  setTimeout(()=>{S.view='dash';setArea('all');},800);
}

// ── EXPORT CSV ────────────────────────────────────────────────────
function exportCSV(){
  const d=filtrar();
  if(!d.length){alert('Execute uma captura primeiro.');return;}
  const h=['Objeto','Órgão','CNPJ','UF','Município','Área','Fonte','Modalidade','Publicado','Abertura','Encerramento','Valor','Score','Prioridade','Palavras-chave','Nota','Link'];
  const rows=d.map(e=>[e.objeto,e.orgao||'',e.cnpj||'',e.uf||'',e.municipio||'',KW[e.area]?.label||e.area||'',e.fonte||'PNCP',e.modalidade||'',e.data_publicacao||'',e.data_abertura||'',e.data_encerramento||'',e.valor||0,e.score||0,e.prioridade||'',(e.palavras||[]).join('; '),getNota(e.id),e.link||'']);
  const csv=[h,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='radar-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function diasAte(d){if(!d)return -1;return Math.round((new Date(d+'T23:59:59')-new Date())/86400000);}
function fmtD(d){if(!d)return'—';return new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});}
function fmtDFull(d){if(!d)return'—';return new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});}
function dHa(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let dbt=null;
function dBusca(v){clearTimeout(dbt);dbt=setTimeout(()=>{S.busca=v;S.pagina=1;if(S.view==='dash')renderDash();},300);}
